<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Generator Kartu Idul Fitri</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-green-900 text-white min-h-screen p-6">
    <h1 class="text-3xl font-bold text-center mb-6">
      🌙 Generator Kartu Idul Fitri
    </h1>

    <div class="max-w-xl mx-auto bg-white text-gray-800 p-6 rounded-xl">
      <input
        id="from"
        placeholder="Nama Anda"
        class="border p-2 rounded w-full mb-3"
      />

      <input
        id="to"
        placeholder="Nama Penerima"
        class="border p-2 rounded w-full mb-4"
      />

      <label class="font-semibold">Pilih Template</label>

      <select id="template" class="border p-2 rounded w-full mb-4">
        <option value="green">Masjid Hijau</option>
        <option value="gold">Gold Elegant</option>
        <option value="night">Malam Takbir</option>
      </select>

      <button
        onclick="generateCard()"
        class="bg-green-600 text-white px-4 py-2 rounded w-full"
      >
        Buat Kartu
      </button>

      <div id="preview" class="hidden mt-6">
        <div id="card" class="p-6 rounded-lg text-center text-white">
          <h2 class="text-2xl mb-3">Selamat Idul Fitri</h2>

          <p id="toText"></p>

          <p class="mt-3">Taqabbalallahu minna wa minkum</p>

          <p class="mt-4" id="fromText"></p>
        </div>

        <button
          onclick="downloadCard()"
          class="mt-4 bg-blue-500 text-white px-4 py-2 rounded w-full"
        >
          Download Kartu
        </button>

        <a
          id="wa"
          target="_blank"
          class="mt-3 block bg-green-500 text-white px-4 py-2 rounded text-center"
        >
          Share WhatsApp
        </a>
      </div>
    </div>

    <script>
      function generateCard() {
        let from = document.getElementById("from").value;
        let to = document.getElementById("to").value;
        let template = document.getElementById("template").value;

        let card = document.getElementById("card");

        if (template == "green") {
          card.style.background = "linear-gradient(135deg,#16a34a,#065f46)";
        }

        if (template == "gold") {
          card.style.background = "linear-gradient(135deg,#b45309,#facc15)";
        }

        if (template == "night") {
          card.style.background = "linear-gradient(135deg,#1e3a8a,#020617)";
        }

        document.getElementById("toText").innerText = "Untuk: " + to;
        document.getElementById("fromText").innerText = "Dari: " + from;

        document.getElementById("preview").classList.remove("hidden");

        let pesan =
          "🌙 Selamat Idul Fitri\n\nUntuk: " +
          to +
          "\n\nMohon maaf lahir batin\n\nDari: " +
          from;

        document.getElementById("wa").href =
          "https://wa.me/?text=" + encodeURIComponent(pesan);
      }

      function downloadCard() {
        html2canvas(document.getElementById("card")).then((canvas) => {
          let link = document.createElement("a");
          link.download = "kartu-idulfitri.png";
          link.href = canvas.toDataURL();
          link.click();
        });
      }
    </script>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  </body>
</html>
