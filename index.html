<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Idul Fitri Card Generator</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</head>

<body class="bg-gray-100 min-h-screen">

<!-- HEADER -->

<header class="bg-green-700 text-white p-4 shadow">
<div class="max-w-6xl mx-auto flex justify-between items-center">

<h1 class="text-xl font-bold">
🌙 Idul Fitri Card Generator
</h1>

<p class="text-sm opacity-80">
Buat kartu ucapan profesional
</p>

</div>
</header>


<div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-8 p-6">

<!-- PANEL KONTROL -->

<div class="bg-white rounded-xl shadow p-6">

<h2 class="text-lg font-semibold mb-4">
Pengaturan Kartu
</h2>

<input id="from"
placeholder="Nama Anda"
class="border p-2 rounded w-full mb-3">

<input id="to"
placeholder="Nama Penerima"
class="border p-2 rounded w-full mb-4">

<label class="font-semibold text-sm">Template</label>

<select id="template"
class="border p-2 rounded w-full mb-4">

<option value="green">Masjid Hijau</option>
<option value="gold">Gold Elegant</option>
<option value="night">Malam Takbir</option>

</select>

<button onclick="generateCard()"
class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded w-full">

Generate Kartu

</button>

<button onclick="downloadCard()"
class="mt-3 bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded w-full">

Download Kartu

</button>

<a id="wa"
target="_blank"
class="mt-3 block text-center bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded">

Share WhatsApp

</a>

</div>



<!-- PREVIEW -->

<div class="flex items-center justify-center">

<div id="card"
class="w-full max-w-md h-80 rounded-xl shadow-lg text-white flex flex-col justify-center items-center text-center p-6 bg-green-600">

<h2 class="text-3xl font-bold mb-3">
Selamat Idul Fitri
</h2>

<p id="toText" class="text-lg"></p>

<p class="mt-4">
Taqabbalallahu minna wa minkum
</p>

<p id="fromText" class="mt-6 text-lg"></p>

</div>

</div>

</div>


<script>

function generateCard(){

let from = document.getElementById("from").value
let to = document.getElementById("to").value
let template = document.getElementById("template").value

let card = document.getElementById("card")

if(template=="green"){
card.style.background="linear-gradient(135deg,#16a34a,#065f46)"
}

if(template=="gold"){
card.style.background="linear-gradient(135deg,#b45309,#facc15)"
}

if(template=="night"){
card.style.background="linear-gradient(135deg,#1e3a8a,#020617)"
}

document.getElementById("toText").innerText="Untuk: "+to
document.getElementById("fromText").innerText="Dari: "+from


let pesan =
"🌙 Selamat Idul Fitri\n\nUntuk: "+to+
"\n\nTaqabbalallahu minna wa minkum\nMohon maaf lahir dan batin\n\nDari: "+from

document.getElementById("wa").href =
"https://wa.me/?text="+encodeURIComponent(pesan)

}


function downloadCard(){

html2canvas(document.getElementById("card")).then(canvas=>{

let link=document.createElement("a")
link.download="kartu-idulfitri.png"
link.href=canvas.toDataURL()
link.click()

})

}

</script>

</body>
</html>
