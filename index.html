<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eid Card Designer</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
background-image:url("https://images.unsplash.com/photo-1519817650390-64a93db511aa");
background-size:cover;
background-position:center;
}

</style>

</head>

<body class="h-screen flex text-white">

<!-- SIDEBAR -->

<div class="w-64 bg-black/60 backdrop-blur p-4">

<h2 class="text-xl font-bold mb-4">
🌙 Template
</h2>

<div class="space-y-3">

<div onclick="setTheme('emerald')" class="h-16 rounded cursor-pointer bg-gradient-to-br from-green-500 to-emerald-800"></div>

<div onclick="setTheme('gold')" class="h-16 rounded cursor-pointer bg-gradient-to-br from-yellow-400 to-orange-700"></div>

<div onclick="setTheme('night')" class="h-16 rounded cursor-pointer bg-gradient-to-br from-blue-700 to-black"></div>

</div>

<hr class="my-6 border-gray-400">

<input id="from" placeholder="Nama Anda"
class="w-full p-2 rounded text-black mb-2">

<input id="to" placeholder="Nama Penerima"
class="w-full p-2 rounded text-black">

</div>


<!-- MAIN CANVAS -->

<div class="flex-1 flex flex-col items-center justify-center">

<div id="card"
class="w-[400px] h-[400px] rounded-3xl shadow-2xl flex flex-col items-center justify-center text-center p-8 bg-gradient-to-br from-green-600 to-emerald-900">

<h1 class="text-4xl font-bold mb-4">
Selamat Idul Fitri
</h1>

<p id="toText" class="text-xl"></p>

<p class="mt-4">
Taqabbalallahu minna wa minkum  
Mohon maaf lahir dan batin
</p>

<p id="fromText" class="mt-6 text-lg font-semibold"></p>

</div>


<div class="flex gap-4 mt-6">

<button onclick="generateCard()"
class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded">

Generate

</button>

<button onclick="downloadCard()"
class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded">

Download

</button>

<a id="wa"
target="_blank"
class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded">

WhatsApp

</a>

</div>

</div>


<script>

let theme="emerald"

function setTheme(t){
theme=t
}

function generateCard(){

let from=document.getElementById("from").value
let to=document.getElementById("to").value

let card=document.getElementById("card")

if(theme=="emerald"){
card.style.background="linear-gradient(135deg,#059669,#064e3b)"
}

if(theme=="gold"){
card.style.background="linear-gradient(135deg,#b45309,#facc15)"
}

if(theme=="night"){
card.style.background="linear-gradient(135deg,#1e3a8a,#020617)"
}

document.getElementById("toText").innerText="Untuk: "+to
document.getElementById("fromText").innerText="Dari: "+from

let pesan=
"Selamat Idul Fitri\n\nUntuk "+to+
"\nMohon maaf lahir batin\n\nDari "+from

document.getElementById("wa").href=
"https://wa.me/?text="+encodeURIComponent(pesan)

}


function downloadCard(){

html2canvas(document.getElementById("card")).then(canvas=>{

let link=document.createElement("a")
link.download="eid-card.png"
link.href=canvas.toDataURL()
link.click()

})

}

</script>

</body>
</html>
