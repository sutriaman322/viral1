<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Idul Fitri Card App</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</head>

<body class="min-h-screen bg-cover bg-center flex items-center justify-center p-6"
style="background-image:url('https://images.unsplash.com/photo-1591608515484-9f6c7b9c8f0f');">

<div class="w-full max-w-6xl grid md:grid-cols-2 gap-8">

<!-- PANEL CONTROL -->

<div class="bg-white/90 backdrop-blur rounded-2xl shadow-xl p-6">

<h1 class="text-2xl font-bold text-green-700 mb-4">
🌙 Idul Fitri Card Creator
</h1>

<p class="text-gray-600 mb-6">
Buat kartu ucapan Idul Fitri dengan desain modern.
</p>

<input id="from"
placeholder="Nama Anda"
class="border p-3 rounded w-full mb-3">

<input id="to"
placeholder="Nama Penerima"
class="border p-3 rounded w-full mb-4">

<label class="text-sm font-semibold">
Pilih Tema
</label>

<select id="theme"
class="border p-3 rounded w-full mb-4">

<option value="emerald">Emerald Mosque</option>
<option value="gold">Golden Eid</option>
<option value="night">Night Takbir</option>

</select>

<button onclick="generateCard()"
class="bg-green-600 hover:bg-green-700 text-white p-3 rounded w-full">

Generate Kartu

</button>

<button onclick="downloadCard()"
class="mt-3 bg-blue-500 hover:bg-blue-600 text-white p-3 rounded w-full">

Download Kartu

</button>

<a id="wa"
target="_blank"
class="mt-3 block text-center bg-green-500 hover:bg-green-600 text-white p-3 rounded">

Share WhatsApp

</a>

</div>



<!-- PREVIEW CARD -->

<div class="flex items-center justify-center">

<div id="card"
class="w-full max-w-md h-96 rounded-2xl shadow-2xl text-white flex flex-col items-center justify-center text-center p-8 bg-gradient-to-br from-green-600 to-emerald-800">

<h2 class="text-3xl font-bold mb-3">
Selamat Idul Fitri
</h2>

<p id="toText" class="text-lg"></p>

<p class="mt-4 opacity-90">
Taqabbalallahu minna wa minkum  
Mohon maaf lahir dan batin
</p>

<p id="fromText" class="mt-6 text-lg font-semibold"></p>

</div>

</div>

</div>


<script>

function generateCard(){

let from=document.getElementById("from").value
let to=document.getElementById("to").value
let theme=document.getElementById("theme").value

let card=document.getElementById("card")

if(theme=="emerald"){
card.style.background="linear-gradient(135deg,#059669,#064e3b)"
}

if(theme=="gold"){
card.style.background="linear-gradient(135deg,#b45309,#facc15)"
}

if(theme=="night"){
card.style.background="linear-gradient(135deg,#1e3a8a,#020617)"
}

document.getElementById("toText").innerText="Untuk: "+to
document.getElementById("fromText").innerText="Dari: "+from

let pesan =
"🌙 Selamat Idul Fitri\n\nUntuk: "+to+
"\n\nTaqabbalallahu minna wa minkum\nMohon maaf lahir dan batin\n\nDari: "+from

document.getElementById("wa").href=
"https://wa.me/?text="+encodeURIComponent(pesan)

}


function downloadCard(){

html2canvas(document.getElementById("card")).then(canvas=>{

let link=document.createElement("a")
link.download="kartu-idulfitri.png"
link.href=canvas.toDataURL()
link.click()

})

}

</script>

</body>
</html>
